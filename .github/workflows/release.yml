name: Build and Release Apps

on:
  push:
    branches: [ "main", "master" ]
    tags: 
      - 'v*' # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Build Android
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 2. Build Linux
  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter build linux --release
      - run: |
          mkdir -p deb/usr/share/myself deb/usr/share/applications deb/usr/bin deb/DEBIAN
          cp -r build/linux/x64/release/bundle/* deb/usr/share/myself/
          ln -s /usr/share/myself/myself deb/usr/bin/myself
          echo "Package: myself" > deb/DEBIAN/control
          echo "Version: 1.0.0" >> deb/DEBIAN/control
          echo "Section: utils" >> deb/DEBIAN/control
          echo "Priority: optional" >> deb/DEBIAN/control
          echo "Architecture: amd64" >> deb/DEBIAN/control
          echo "Maintainer: author" >> deb/DEBIAN/control
          echo "Description: myself chat app" >> deb/DEBIAN/control
          echo "[Desktop Entry]" > deb/usr/share/applications/myself.desktop
          echo "Name=myself" >> deb/usr/share/applications/myself.desktop
          echo "Exec=/usr/bin/myself" >> deb/usr/share/applications/myself.desktop
          echo "Type=Application" >> deb/usr/share/applications/myself.desktop
          echo "Categories=Network;" >> deb/usr/share/applications/myself.desktop
          dpkg-deb --build deb myself-linux-amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: myself-linux-amd64.deb

  # 3. Build Windows
  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release
      - run: iscc installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: Output/myself-setup.exe



  # 5. Create GitHub Release (Only on Tags)
  create_release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_android, build_linux, build_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/app-release.apk
            artifacts/myself-linux-amd64.deb
            artifacts/myself-setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
