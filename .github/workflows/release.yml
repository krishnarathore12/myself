name: Build and Release Apps

on:
  push:
    branches: [ "main", "master" ]
    tags: 
      - 'v*' # Trigger on version tags like v1.0.0
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Build Android
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 2. Build Linux
  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release/bundle/
          tar -czf ../../../../../myself-linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: myself-linux.tar.gz

  # 3. Build Windows
  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release
      - run: |
          Compress-Archive -Path build\windows\x64\release\* -DestinationPath myself-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: myself-windows.zip

  # 4. Build iOS & macOS
  build_apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - run: flutter config --enable-macos-desktop
      - run: flutter build macos --release
      # Zip the macOS app bundle
      - run: |
          cd build/macos/Build/Products/Release/
          zip -r ../../../../../myself-macos.zip myself.app
      
      - run: flutter build ios --release --no-codesign
      # Zip the iOS directory
      - run: |
          cd build/ios/iphoneos/
          zip -r ../../../myself-ios-unsigned.zip Runner.app
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: myself-macos.zip
      
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: myself-ios-unsigned.zip

  # 5. Create GitHub Release (Only on Tags)
  create_release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_android, build_linux, build_windows, build_apple]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/app-release.apk
            artifacts/myself-linux.tar.gz
            artifacts/myself-windows.zip
            artifacts/myself-macos.zip
            artifacts/myself-ios-unsigned.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
